{{- with .Values.workbenches }}
{{- range . }}
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  annotations:
    openshift.io/description: 'PVC for {{ .name }}'
    openshift.io/display-name: {{ .displayName | default .name }}
    argocd.argoproj.io/sync-wave: "-5"
  name: {{ .name }}-storage
  namespace: {{ $.Values.dataScienceProjectNamespace }}
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .storage | default "5Gi" }}
  volumeMode: Filesystem
{{- end }}
{{- end }}
