{{- with .Values.workbenches }}
{{- range . }}
---
# This RoleBinding grants the workbench ServiceAccount permission to pull images
# from the redhat-ods-applications namespace where RHOAI images are stored
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .name }}-image-puller
  namespace: redhat-ods-applications
  labels:
    app: {{ .name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
- kind: ServiceAccount
  name: {{ .name }}
  namespace: {{ $.Values.dataScienceProjectNamespace }}
{{- end }}
{{- end }}
