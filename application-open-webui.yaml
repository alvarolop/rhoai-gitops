---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app: open-webui
  name: open-webui
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: open-webui
  project: default
  source:
    chart: open-webui
    repoURL: https://helm.openwebui.com/
    targetRevision: 12.10.0
    helm:
      values: |
        # Disable bundled subcharts (using external OpenAI-compatible API)
        ollama:
          enabled: false
        pipelines:
          enabled: false
        websocket:
          enabled: false

        # OpenAI-compatible APIs (supports multiple endpoints)
        # Add multiple APIs by adding more entries to these arrays
        openaiBaseApiUrls:
          - "$MODEL_API_URL"
          # - "https://another-api.example.com/v1"
          # - "https://third-api.example.com/v1"
        openaiApiKeys:
          - "$MODEL_API_TOKEN"
          # - "sk-another-key"
          # - "sk-third-key"

        # Persistence
        persistence:
          enabled: true
          size: 5Gi

        # OpenShift: container writes to image paths (/app/backend/open_webui/static/,
        # .webui_secret_key) that require root. The restricted SCC assigns a random UID
        # that cannot write to these files, so anyuid SCC is needed.
        containerSecurityContext:
          runAsUser: 0

        # volumes:
        #     - name: config-trusted-cabundle
        #       configMap:
        #         name: config-trusted-cabundle
        # volumeMounts:
        #   container:
        #     - name: config-trusted-cabundle
        #       mountPath: /etc/ssl/certs/ca-certificates.crt
        #       subPath: ca-bundle.crt
        #       readOnly: true

        # Environment variables
        extraEnvVars:
          # - name: REQUESTS_CA_BUNDLE # For Web
          #   value: "/etc/ssl/certs/ca-certificates.crt"
          # - name: SSL_CERT_FILE # For OAuth
          #   value: "/etc/ssl/certs/ca-certificates.crt"

          # Authentication: Enable OAuth/OIDC with OpenShift
          - name: WEBUI_AUTH
            value: "True"

          # OAuth/OIDC Configuration (OpenShift as Identity Provider)
          - name: ENABLE_OAUTH_SIGNUP
            value: "true"
          - name: OAUTH_PROVIDER_NAME
            value: "OpenShift"
          - name: OAUTH_CLIENT_ID
            value: "open-webui"
          - name: OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: open-webui-oauth-secret
                key: client-secret
          - name: OPENID_PROVIDER_URL
            value: "https://oauth-openshift.apps.$OPENSHIFT_CLUSTER_DOMAIN"
          - name: WEBUI_URL
            value: "https://open-webui-open-webui.apps.$OPENSHIFT_CLUSTER_DOMAIN"
          - name: OAUTH_SCOPES
            value: "openid email profile"
          # Optional: Enable role management from OpenShift groups
          # - name: ENABLE_OAUTH_ROLE_MANAGEMENT
          #   value: "true"
          # - name: OAUTH_ROLES_CLAIM
          #   value: "groups"
          # - name: OAUTH_ADMIN_ROLES
          #   value: "cluster-admins,open-webui-admins"

          # RAG Embedding Configuration
          - name: RAG_EMBEDDING_ENGINE
            value: "openai"
          - name: RAG_OPENAI_API_BASE_URL
            value: "$EMBEDDINGS_MODEL_API_URL"
          - name: RAG_OPENAI_API_KEY
            value: "$EMBEDDINGS_MODEL_API_TOKEN"
          - name: RAG_EMBEDDING_MODEL
            value: "$EMBEDDINGS_MODEL_NAME"

        # OpenShift-specific resources
        extraResources:
          # Route for external access
          - apiVersion: route.openshift.io/v1
            kind: Route
            metadata:
              name: open-webui
              labels:
                app: open-webui
            spec:
              to:
                kind: Service
                name: open-webui
                weight: 100
              port:
                targetPort: http
              tls:
                termination: edge
              wildcardPolicy: None

          # OAuth Secret for OpenShift OIDC integration
          - apiVersion: v1
            kind: Secret
            metadata:
              name: open-webui-oauth-secret
              namespace: open-webui
            type: Opaque
            stringData:
              client-secret: "$OAUTH_CLIENT_SECRET"

          # OpenShift OAuthClient for OIDC integration
          - apiVersion: oauth.openshift.io/v1
            kind: OAuthClient
            metadata:
              name: open-webui
            secret: "$OAUTH_CLIENT_SECRET"
            redirectURIs:
              - "https://open-webui-open-webui.apps.$OPENSHIFT_CLUSTER_DOMAIN/oauth/oidc/callback"
            grantMethod: auto

          # ClusterRoleBinding for anyuid SCC
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: open-webui-anyuid
            subjects:
              - kind: ServiceAccount
                name: open-webui-sa
                namespace: open-webui
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: system:openshift:scc:anyuid
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
