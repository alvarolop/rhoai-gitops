---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app: open-webui
  name: open-webui
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: open-webui
  project: default
  source:
    chart: open-webui
    repoURL: https://helm.openwebui.com/
    targetRevision: 14.5.0
    helm:
      values: |
        # Disable bundled subcharts (using external OpenAI-compatible API)
        ollama:
          enabled: false
        pipelines:
          enabled: false
        websocket:
          enabled: false

        # OpenAI-compatible APIs (supports multiple endpoints)
        # Using internal service from model-gpt-oss namespace
        # First element can be overridden via environment variables: OPENAI_API_URL, OPENAI_API_KEY
        openaiBaseApiUrls:
          - "${OPENAI_API_URL:-http://gpt-oss-20b-kserve-workload-svc.model-gpt-oss.svc.cluster.local:8000/v1}"
          # - "https://another-api.example.com/v1"
          # - "https://third-api.example.com/v1"
        openaiApiKeys:
          - "${OPENAI_API_KEY:-not-needed}"
          # - "sk-another-key"
          # - "sk-third-key"

        # Persistence
        persistence:
          enabled: false
          size: 5Gi

        # OpenShift: container writes to image paths (/app/backend/open_webui/static/,
        # .webui_secret_key) that require root. The restricted SCC assigns a random UID
        # that cannot write to these files, so anyuid SCC is needed.
        containerSecurityContext:
          runAsUser: 0

        # volumes:
        #     - name: config-trusted-cabundle
        #       configMap:
        #         name: config-trusted-cabundle
        # volumeMounts:
        #   container:
        #     - name: config-trusted-cabundle
        #       mountPath: /etc/ssl/certs/ca-certificates.crt
        #       subPath: ca-bundle.crt
        #       readOnly: true

        # Environment variables - sourced from Secret
        # Most up-to-date environment variables: https://docs.openwebui.com/getting-started/env-configuration/
        extraEnvFrom:
          - secretRef:
              name: open-webui-config

        # OpenShift-specific resources
        extraResources:
          # Secret with Open WebUI environment variables
          - apiVersion: v1
            kind: Secret
            metadata:
              name: open-webui-config
              namespace: open-webui
            type: Opaque
            stringData:
              # Authentication and user management
              # First user to sign up becomes admin automatically
              ENABLE_SIGNUP: "True"
              ENABLE_LOGIN_FORM: "True"
              DEFAULT_USER_ROLE: "user"
              # Optional: Auto-create admin account on first startup
              # Note: When enabled, ENABLE_SIGNUP is auto-disabled after admin creation
              # WEBUI_ADMIN_NAME: "admin"
              # WEBUI_ADMIN_EMAIL: "admin@example.org"
              # WEBUI_ADMIN_PASSWORD: "password"

          # Route for external access
          - apiVersion: route.openshift.io/v1
            kind: Route
            metadata:
              name: open-webui
              namespace: open-webui
              labels:
                app: open-webui
            spec:
              subdomain: chat
              to:
                kind: Service
                name: open-webui
                weight: 100
              port:
                targetPort: http
              tls:
                termination: edge
              wildcardPolicy: None

          # ClusterRoleBinding for anyuid SCC
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: open-webui-anyuid
            subjects:
              - kind: ServiceAccount
                name: open-webui-sa
                namespace: open-webui
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: system:openshift:scc:anyuid

          # ConfigMap to track if signup has been enabled
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: open-webui-signup-enabler-status
              namespace: open-webui
            data:
              enabled: "false"

          # One-time Job to enable signup in database
          # Runs once after first admin is created, then never again
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: open-webui-signup-enabler
              namespace: open-webui
            spec:
              backoffLimit: 3
              template:
                spec:
                  serviceAccountName: open-webui-sa
                  restartPolicy: Never
                  containers:
                    - name: enable-signup
                      image: quay.io/openshift/origin-cli:latest
                      command:
                        - /bin/bash
                        - -c
                        - |
                          set -e

                          # Check if already enabled
                          STATUS=$(oc get configmap open-webui-signup-enabler-status -n open-webui -o jsonpath='{.data.enabled}')
                          if [ "$STATUS" = "true" ]; then
                            echo "Signup already enabled previously, skipping..."
                            exit 0
                          fi

                          echo "Waiting for Open WebUI pod to be ready..."
                          oc wait --for=condition=ready pod -l app.kubernetes.io/name=open-webui -n open-webui --timeout=300s || exit 0

                          POD=$(oc get pod -l app.kubernetes.io/name=open-webui -n open-webui -o jsonpath='{.items[0].metadata.name}')
                          echo "Found pod: $POD"

                          # Wait for at least one user to exist (admin created)
                          echo "Waiting for admin user to be created..."
                          for i in {1..30}; do
                            USER_COUNT=$(oc exec -n open-webui $POD -- sqlite3 /app/backend/data/webui.db "SELECT COUNT(*) FROM user;" 2>/dev/null || echo "0")
                            if [ "$USER_COUNT" -gt 0 ]; then
                              echo "Admin user found!"
                              break
                            fi
                            echo "No users yet, waiting... ($i/30)"
                            sleep 10
                          done

                          # Enable signup in database
                          echo "Enabling signup in database..."
                          oc exec -n open-webui $POD -- sqlite3 /app/backend/data/webui.db \
                            "INSERT OR REPLACE INTO config (key, data) VALUES ('ENABLE_SIGNUP', json('{\"value\": true}'));" || true

                          # Mark as completed
                          oc patch configmap open-webui-signup-enabler-status -n open-webui --type merge -p '{"data":{"enabled":"true"}}'

                          echo "Signup enabled successfully! This job will not run again."

          # RBAC for the Job
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: open-webui-signup-enabler
              namespace: open-webui
            rules:
              - apiGroups: [""]
                resources: ["pods", "pods/exec", "configmaps"]
                verbs: ["get", "list", "create", "patch"]

          - apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: open-webui-signup-enabler
              namespace: open-webui
            subjects:
              - kind: ServiceAccount
                name: open-webui-sa
                namespace: open-webui
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: open-webui-signup-enabler
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
