---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app: open-webui
  name: open-webui
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: open-webui
  project: default
  source:
    chart: open-webui
    repoURL: https://helm.openwebui.com/
    targetRevision: 14.5.0
    helm:
      values: |
        # Disable bundled subcharts (using external OpenAI-compatible API)
        ollama:
          enabled: false
        pipelines:
          enabled: false
        websocket:
          enabled: false

        # OpenAI-compatible APIs (supports multiple endpoints)
        # Using internal service from model-gpt-oss namespace
        # First element can be overridden via environment variables: OPENAI_API_URL, OPENAI_API_KEY
        openaiBaseApiUrls:
          - ${OPENAI_API_URL}
          # - "https://another-api.example.com/v1"
          # - "https://third-api.example.com/v1"
        openaiApiKeys:
          - ${OPENAI_API_KEY}
          # - "sk-another-key"
          # - "sk-third-key"

        # Persistence
        persistence:
          enabled: false
          size: 5Gi

        # OpenShift: container writes to image paths (/app/backend/open_webui/static/,
        # .webui_secret_key) that require root. The restricted SCC assigns a random UID
        # that cannot write to these files, so anyuid SCC is needed.
        containerSecurityContext:
          runAsUser: 0

        volumes:
            - name: config-trusted-cabundle
              configMap:
                name: config-service-cabundle
        volumeMounts:
          container:
            - name: config-trusted-cabundle
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: service-ca.crt
              readOnly: true

        # Environment variables - sourced from Secret
        # Most up-to-date environment variables: https://docs.openwebui.com/getting-started/env-configuration/
        extraEnvFrom:
          - secretRef:
              name: open-webui-config

        # OpenShift-specific resources
        extraResources:
          # Secret with Open WebUI environment variables
          - apiVersion: v1
            kind: Secret
            metadata:
              name: open-webui-config
              namespace: open-webui
            type: Opaque
            stringData:
              # Authentication - disabled for testing
              WEBUI_AUTH: "false"
              
              # Trusted CA bundle
              REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt

              # Authentication and user management (commented out for testing)
              # ENABLE_SIGNUP: "true"
              # ENABLE_LOGIN_FORM: "true"
              # ENABLE_SIGNUP_FORM: "true"
              # DEFAULT_USER_ROLE: "user"
              # ENABLE_PERSISTENT_CONFIG: "false"
              #
              # KNOWN BUG: https://github.com/open-webui/open-webui/issues/20389
              # Even with ENABLE_PERSISTENT_CONFIG=false + ENABLE_SIGNUP=true:
              # - First user can sign up (becomes admin) ✅
              # - Signup button disappears for subsequent users ❌
              # - Admin panel shows "Enable New Sign Ups" is OFF ❌
              # - Database stores enable_signup: false despite env var ❌
              #
              # WORKAROUND: Manually enable "Enable New Sign Ups" toggle in Admin Panel
              # Settings -> General → Authentication → Enable New Sign Ups (turn ON)
              # This setting will persist across restarts.
              #
              # Optional: Auto-create admin account on first startup
              # Note: When enabled, ENABLE_SIGNUP is auto-disabled after admin creation
              # WEBUI_ADMIN_NAME: "admin"
              # WEBUI_ADMIN_EMAIL: "admin@example.org"
              # WEBUI_ADMIN_PASSWORD: "password"

          # Route for external access
          - apiVersion: route.openshift.io/v1
            kind: Route
            metadata:
              name: open-webui
              namespace: open-webui
              labels:
                app: open-webui
            spec:
              subdomain: chat
              to:
                kind: Service
                name: open-webui
                weight: 100
              port:
                targetPort: http
              tls:
                termination: edge
              wildcardPolicy: None

          # ClusterRoleBinding for anyuid SCC
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: open-webui-anyuid
            subjects:
              - kind: ServiceAccount
                name: open-webui-sa
                namespace: open-webui
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: system:openshift:scc:anyuid
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
