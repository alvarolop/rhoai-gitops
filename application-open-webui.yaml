---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app: open-webui
  name: open-webui
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: open-webui
  project: default
  source:
    chart: open-webui
    repoURL: https://helm.openwebui.com/
    targetRevision: 14.5.0
    helm:
      values: |
        # Disable bundled subcharts (using external OpenAI-compatible API)
        ollama:
          enabled: false
        pipelines:
          enabled: false
        websocket:
          enabled: false

        # OpenAI-compatible APIs (supports multiple endpoints)
        # Using internal service from model-gpt-oss namespace
        openaiBaseApiUrls:
          - "http://gpt-oss-20b-kserve-workload-svc.model-gpt-oss.svc.cluster.local:8000/v1"
          # - "https://another-api.example.com/v1"
          # - "https://third-api.example.com/v1"
        openaiApiKeys:
          - "not-needed"
          # - "sk-another-key"
          # - "sk-third-key"

        # Persistence
        persistence:
          enabled: true
          size: 5Gi

        # OpenShift: container writes to image paths (/app/backend/open_webui/static/,
        # .webui_secret_key) that require root. The restricted SCC assigns a random UID
        # that cannot write to these files, so anyuid SCC is needed.
        containerSecurityContext:
          runAsUser: 0

        # volumes:
        #     - name: config-trusted-cabundle
        #       configMap:
        #         name: config-trusted-cabundle
        # volumeMounts:
        #   container:
        #     - name: config-trusted-cabundle
        #       mountPath: /etc/ssl/certs/ca-certificates.crt
        #       subPath: ca-bundle.crt
        #       readOnly: true

        # Environment variables
        extraEnvVars:
          # Authentication: Disabled for simplicity
          - name: WEBUI_AUTH
            value: "False"

        # OpenShift-specific resources
        extraResources:
          # Route for external access
          - apiVersion: route.openshift.io/v1
            kind: Route
            metadata:
              name: open-webui
              labels:
                app: open-webui
            spec:
              to:
                kind: Service
                name: open-webui
                weight: 100
              port:
                targetPort: http
              tls:
                termination: edge
              wildcardPolicy: None

          # ClusterRoleBinding for anyuid SCC
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: open-webui-anyuid
            subjects:
              - kind: ServiceAccount
                name: open-webui-sa
                namespace: open-webui
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: system:openshift:scc:anyuid
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
