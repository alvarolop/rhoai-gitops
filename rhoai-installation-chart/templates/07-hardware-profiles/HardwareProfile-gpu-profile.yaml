{{- if .Values.distributedWorkloads.enabled }}
---
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/dashboard-feature-visibility: '[]'
    opendatahub.io/disabled: 'false'
    opendatahub.io/display-name: gpu-profile
    opendatahub.io/description: GPU workloads with NVIDIA accelerators. Scheduling via Kueue queue; GPU nodes and taints come from the gpu ResourceFlavor.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: gpu-profile
  namespace: redhat-ods-applications
spec:
  identifiers:
    - defaultCount: '1'
      displayName: CPU
      identifier: cpu
      maxCount: '8'
      minCount: 1
      resourceType: CPU
    - defaultCount: 12Gi
      displayName: Memory
      identifier: memory
      maxCount: 32Gi
      minCount: 1Gi
      resourceType: Memory
    - defaultCount: 1
      displayName: GPU
      identifier: nvidia.com/gpu
      maxCount: 4
      minCount: 1
      resourceType: Accelerator
  scheduling:
    type: Queue
    kueue:
      localQueueName: {{ .Values.distributedWorkloads.defaultLocalQueueName | quote }}
{{- end }}
