{{- if .Values.distributedWorkloads.enabled }}
---
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/dashboard-feature-visibility: '[]'
    opendatahub.io/disabled: 'false'
    opendatahub.io/display-name: MIG 3g.47gb
    opendatahub.io/description: "MIG 3g.47gb profile: Medium GPU slice with ~47GB memory, suitable for medium-sized models. 2 instances per GPU."
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: mig-3g-47gb-profile
  namespace: redhat-ods-applications
spec:
  identifiers:
    - defaultCount: '2'
      displayName: CPU
      identifier: cpu
      maxCount: '8'
      minCount: 1
      resourceType: CPU
    - defaultCount: 16Gi
      displayName: Memory
      identifier: memory
      maxCount: 32Gi
      minCount: 1Gi
      resourceType: Memory
    - defaultCount: 1
      displayName: MIG 3g.47gb
      identifier: nvidia.com/mig-3g.47gb
      maxCount: 2
      minCount: 1
      resourceType: Accelerator
  scheduling:
    type: Queue
    kueue:
      localQueueName: {{ .Values.distributedWorkloads.defaultLocalQueueName | quote }}
{{- end }}
