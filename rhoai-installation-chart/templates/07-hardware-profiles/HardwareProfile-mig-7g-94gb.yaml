{{- if .Values.distributedWorkloads.enabled }}
---
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/dashboard-feature-visibility: '[]'
    opendatahub.io/disabled: 'false'
    opendatahub.io/display-name: MIG 7g.94gb (Full GPU)
    opendatahub.io/description: "MIG 7g.94gb profile: Full GPU with 94GB memory, for large models and training workloads. 1 instance per GPU."
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
  name: mig-7g-94gb-profile
  namespace: redhat-ods-applications
spec:
  identifiers:
    - defaultCount: '4'
      displayName: CPU
      identifier: cpu
      maxCount: '16'
      minCount: 1
      resourceType: CPU
    - defaultCount: 24Gi
      displayName: Memory
      identifier: memory
      maxCount: 64Gi
      minCount: 1Gi
      resourceType: Memory
    - defaultCount: 1
      displayName: MIG 7g.94gb (Full GPU)
      identifier: nvidia.com/mig-7g.94gb
      maxCount: 1
      minCount: 1
      resourceType: Accelerator
  scheduling:
    type: Queue
    kueue:
      localQueueName: {{ .Values.distributedWorkloads.defaultLocalQueueName | quote }}
{{- end }}
