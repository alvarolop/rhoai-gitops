{{- if .Values.distributedWorkloads.enabled }}
---
# MIG 7g.94gb nodes: tolerate MIG taints for full GPU (via MIG)
# Full H100 instance with 94GB memory, for large models and training
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: mig-7g-94gb
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
{{- if .Values.distributedWorkloads.topologyAwareScheduling }}
  topologyName: rhoai-hostname
  # Node label set by NVIDIA GPU Operator for MIG-capable nodes
  nodeLabels:
    nvidia.com/mig.capable: "true"
{{- end }}
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
{{- end }}
