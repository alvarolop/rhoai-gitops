{{- if .Values.distributedWorkloads.enabled }}
---
# MIG 3g.47gb nodes: tolerate MIG taints for medium GPU slices
# Medium instance with ~47GB memory, suitable for medium-sized models
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: mig-3g-47gb
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
{{- if .Values.distributedWorkloads.topologyAwareScheduling }}
  topologyName: rhoai-hostname
  # Node label set by NVIDIA GPU Operator for MIG-capable nodes
  nodeLabels:
    nvidia.com/mig.capable: "true"
{{- end }}
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
{{- end }}
