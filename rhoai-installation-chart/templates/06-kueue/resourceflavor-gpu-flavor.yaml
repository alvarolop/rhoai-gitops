{{- if .Values.distributedWorkloads.enabled }}
---
# NVIDIA GPU nodes: tolerate the GPU device plugin taint so workloads can schedule on GPU workers.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: {{ .Values.distributedWorkloads.gpuResourceFlavorName }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
{{- if .Values.distributedWorkloads.topologyAwareScheduling }}
  topologyName: rhoai-hostname
  # Set by NVIDIA GPU Operator on nodes where the device plugin is deployed (Kueue TAS).
  nodeLabels:
    nvidia.com/gpu.deploy.device-plugin: "true"
{{- end }}
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
{{- end }}
