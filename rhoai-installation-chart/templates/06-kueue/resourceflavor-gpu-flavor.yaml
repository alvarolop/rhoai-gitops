{{- if .Values.distributedWorkloads.enabled }}
---
# NVIDIA GPU nodes: tolerate the GPU device plugin taint so workloads can schedule on GPU workers.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-flavor
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
  # Topology Aware Scheduling disabled - uncomment below if needed:
  # topologyName: rhoai-hostname
  # nodeLabels:
  #   nvidia.com/gpu.deploy.device-plugin: "true"
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
{{- end }}
