---
{{ if and .Values.llm_d.enabled .Values.llm_d.ocpRouteGateway.enabled }}
# OpenShift Route to the Istio-managed Service for Gateway openshift-ai-inference-ocproute.
# With gateways.ingress.service.type: ClusterIP, the router sends traffic to that Service inside
# the cluster instead of requiring an external cloud LoadBalancer on the Service.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshift-ai-inference-ocproute
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  host: {{ .Values.llm_d.ocpRouteGateway.hostname | default (printf "inference-gateway-route.apps.%s" .Values.global.clusterDomain) | quote }}
  port:
    targetPort: {{ .Values.llm_d.ocpRouteGateway.routeTargetPortName | quote }}
  to:
    kind: Service
    name: {{ .Values.llm_d.ocpRouteGateway.backendServiceName | default "openshift-ai-inference-ocproute" | quote }}
    weight: 100
  wildcardPolicy: None
{{ end }}
