---
{{ if and .Values.llm_d.enabled .Values.llm_d.ocpRouteGateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshift-ai-inference-ocproute
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
  gatewayClassName: openshift-ai-inference-ocproute
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: openshift-ai-inference-ocproute-override-config
  listeners:
    - allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: rhoai-serving/model
                operator: Exists
      hostname: inference-gateway-route.apps.{{ .Values.global.clusterDomain }}
      name: http
      port: 80
      protocol: HTTP
{{ end }}
