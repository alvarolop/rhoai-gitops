{{ if and .Values.llm_d.enabled .Values.llm_d.ocpRouteGateway.enabled .Values.llm_d.tlsCrtB64 .Values.llm_d.tlsKeyB64 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: openshift-ai-inference-external-certs
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.llm_d.tlsCrtB64 }}
  tls.key: {{ .Values.llm_d.tlsKeyB64 }}
{{ end }}
