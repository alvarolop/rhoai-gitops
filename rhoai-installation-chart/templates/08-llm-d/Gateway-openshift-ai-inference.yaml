{{ if and .Values.llm_d.enabled .Values.llm_d.ocpRouteGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshift-ai-inference
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: openshift-ai-inference
  # Use ConfigMap to inject Service CA annotation for automatic TLS certificate generation
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: openshift-ai-inference-service-override
  listeners:
    # External listener - HTTPS for Route traffic (public hostname)
    - allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: rhoai-serving/model
                operator: Exists
      hostname: openshift-ai-inference.apps.{{ .Values.global.clusterDomain }}
      name: external
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ if and .Values.llm_d.tlsCrtB64 .Values.llm_d.tlsKeyB64 }}openshift-ai-inference-external-certs{{ else }}openshift-ai-inference-internal-certs{{ end }}
        mode: Terminate
    # Internal listener - HTTPS for Service traffic (Nemo Guardrails, etc.)
    - allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: rhoai-serving/model
                operator: Exists
      hostname: openshift-ai-inference-openshift-ai-inference.openshift-ingress.svc.cluster.local
      name: internal
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: openshift-ai-inference-internal-certs
        mode: Terminate
{{ end }}
