{{ if and .Values.llm_d.enabled .Values.llm_d.ocpRouteGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshift-ai-inference
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: openshift-ai-inference
  listeners:
    # External listener - HTTPS with TLS termination
    - allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: rhoai-serving/model
                operator: Exists
      hostname: openshift-ai-inference.apps.{{ .Values.global.clusterDomain }}
      name: external
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: openshift-ai-inference-gateway-tls
        mode: Terminate
{{ end }}
