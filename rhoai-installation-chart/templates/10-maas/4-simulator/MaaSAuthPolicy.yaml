{{ if and .Values.modelsAsService.enabled .Values.modelsAsService.simulator.enabled }}
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSAuthPolicy
metadata:
  name: simulator-access
  namespace: {{ .Values.modelsAsService.namespace | default "models-as-a-service" }}
  annotations:
    openshift.io/display-name: "Simulator Access"
    openshift.io/description: "Grants all authenticated users access to the simulator model"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
  modelRefs:
    - name: facebook-opt-125m-simulated
      namespace: {{ .Values.modelsAsService.namespace | default "models-as-a-service" }}
  subjects:
    groups:
      - name: system:authenticated
    users: []
{{ end }}
