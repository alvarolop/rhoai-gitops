{{ if and .Values.modelsAsService.enabled .Values.modelsAsService.simulator.enabled }}
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: simulator-free
  namespace: {{ .Values.modelsAsService.namespace | default "models-as-a-service" }}
  annotations:
    openshift.io/display-name: "Simulator Free Tier"
    openshift.io/description: "Free tier: 100 tokens/min for all authenticated users"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
  owner:
    groups:
      - name: system:authenticated
    users: []
  modelRefs:
    - name: facebook-opt-125m-simulated
      namespace: {{ .Values.modelsAsService.namespace | default "models-as-a-service" }}
      tokenRateLimits:
        - limit: 100
          window: 1m
  priority: 10
{{ end }}