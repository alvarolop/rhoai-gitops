{{- if and .Values.modelsAsService.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: models-as-a-service
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/name: maas-gateway
    app.kubernetes.io/part-of: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  host: maas.apps.{{ .Values.global.clusterDomain }}
  to:
    kind: Service
    name: maas-default-gateway-maas-default-gateway
    weight: 100
  port:
    targetPort: 443
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
