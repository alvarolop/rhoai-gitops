{{ if and .Values.modelsAsService.enabled .Values.modelsAsService.grafana.enabled }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: llm-d-internal
  namespace: grafana
  labels:
    app: grafana
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  configMapRef:
    name: llm-d-internal-dashboard
    key: dashboard.json
  folder: RHOAI
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
{{ end }}
