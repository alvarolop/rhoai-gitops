{{- if .Values.llm_d.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorino
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true,SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "17"
spec:
  template:
    spec:
      containers:
      - name: authorino
        env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/openshift-service-ca/service-ca.crt
        volumeMounts:
        - name: openshift-service-ca
          mountPath: /etc/ssl/certs/openshift-service-ca
          readOnly: true
      volumes:
      - name: openshift-service-ca
        configMap:
          name: openshift-service-ca.crt
{{- end }}
