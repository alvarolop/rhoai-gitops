{{- if and .Values.evalHub.enabled .Values.evalHub.postgresql.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.evalHub.postgresql.name }}
  namespace: {{ .Values.evalHub.postgresql.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: {{ .Values.evalHub.postgresql.name }}
  type: ClusterIP
  ports:
    - protocol: TCP
      port: {{ .Values.evalHub.postgresql.service.port }}
      targetPort: {{ .Values.evalHub.postgresql.service.port }}
{{- end }}
