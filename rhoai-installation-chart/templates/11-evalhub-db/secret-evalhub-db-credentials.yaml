{{- if and .Values.evalHub.enabled .Values.evalHub.postgresql.enabled }}
{{- $pg := .Values.evalHub.postgresql }}
{{- $host := printf "%s.%s.svc.cluster.local" $pg.name $pg.namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: evalhub-db-credentials
  namespace: {{ .Values.evalHub.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  db-url: {{ printf "postgresql://%s:%s@%s:%v/%s" ($pg.connection.user | urlquery) ($pg.connection.password | urlquery) $host $pg.service.port $pg.connection.database | quote }}
{{- end }}
