{{ if and .Values.llm_d.enabled .Values.llm_d.internalOnly.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-internal
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: llm-d-internal
  # Use ConfigMap to inject Service CA annotation for automatic TLS certificate generation
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: llm-d-internal-service-override
  listeners:
    # Internal listener only - HTTPS for Service traffic (no external Route)
    - allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: rhoai-serving/model
                operator: Exists
      hostname: llm-d-internal-llm-d-internal.openshift-ingress.svc.cluster.local
      name: internal
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: llm-d-internal-gateway-tls
        mode: Terminate
{{ end }}
