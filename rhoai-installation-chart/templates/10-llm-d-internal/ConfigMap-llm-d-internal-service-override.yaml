{{ if and .Values.llm_d.enabled .Values.llm_d.internalOnly.enabled }}
---
# ConfigMap to inject Service CA annotation into Gateway-created Service
# This makes the Service CA operator automatically generate a TLS certificate
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-d-internal-service-override
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "9"
data:
  service: |
    metadata:
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: "llm-d-internal-gateway-tls"
    spec:
      type: ClusterIP
{{ end }}
