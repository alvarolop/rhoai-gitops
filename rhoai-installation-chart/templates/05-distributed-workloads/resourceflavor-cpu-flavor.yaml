{{- if .Values.distributedWorkloads.enabled }}
---
# CPU / general nodes: no GPU taint tolerations (pods land on untainted worker nodes).
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: {{ .Values.distributedWorkloads.cpuResourceFlavorName }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec: {}
{{- end }}
