{{- if and .Values.modelsAsService.enabled .Values.modelsAsService.postgresql.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.modelsAsService.postgresql.name }}
  namespace: {{ .Values.modelsAsService.postgresql.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.modelsAsService.postgresql.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.modelsAsService.postgresql.name }}
    spec:
      containers:
        - name: {{ .Values.modelsAsService.postgresql.name }}
          image: {{ .Values.modelsAsService.postgresql.image }}
          ports:
            - containerPort: {{ .Values.modelsAsService.postgresql.service.port }}
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.modelsAsService.postgresql.name }}-credentials
                  key: POSTGRES_DB
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.modelsAsService.postgresql.name }}-credentials
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.modelsAsService.postgresql.name }}-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: {{ .Values.modelsAsService.postgresql.name }}-data
{{- end }}
