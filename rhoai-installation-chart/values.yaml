# Default values for rhoai-installation-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  culling:
    enabled: true
  # DNS segment after apps. in route hostnames (e.g. ocp.sandbox3642.opentlc.com for *.apps.ocp.sandbox3642.opentlc.com).
  clusterDomain: "ocp.sandbox437.opentlc.com"

modelRegistry:
  enabled: true
  mysql:
    enabled: true
    namespace: rhoai-model-registries-mysql
    name: mysql
    metrics:
      enabled: false
    persistence:
      enabled: true
      size: 30Gi

distributedWorkloads:
  enabled: true
  # Must match ClusterQueue and LocalQueue names used on the cluster (see templates/05-distributed-workloads).
  clusterQueueName: cluster-queue
  defaultLocalQueueName: default
  # Topology Aware Scheduling: Commented out as it's not needed for basic Kueue functionality.
  # Topology CR + ResourceFlavor.spec.topologyName + nodeLabels prevent SchedulingGated deadlocks
  # for GPU serving workloads, but adds complexity. Uncomment if needed for advanced scheduling.
  # topologyAwareScheduling: false
  # Topology name (`rhoai-hostname`) and ResourceFlavor `nodeLabels` are in templates/06-kueue/.

llamaStack:
  enabled: true

# When true: DataScienceCluster sets kserve.modelsAsService to Managed and the chart applies the
# maas-default-gateway GatewayClass (Gateway API). Required for MaaS-style LLMInferenceService
# deployments that use router.gateway.refs. Set false if you only use normal Route-based inference
# without a shared Gateway API gateway.
modelsAsService:
  enabled: true
  namespace: models-as-a-service
  grafana:
    enabled: true
  postgresql:
    enabled: true
    namespace: rhoai-maas-db
    name: postgresql
    image: registry.redhat.io/rhel9/postgresql-15:9.7
    connection:
      database: maas
      user: maas
      password: SecurePassword123  # Change for production
      storageSize: 20Gi
    service:
      port: 5432
      ssl: false
  simulator:
    enabled: true
  # MaaS configurations - each entry creates a Subscription and AuthPolicy
  configs:
    - name: basic-models
      displayName: "Basic Models"
      description: "Basic subscription for demo models"
      priority: 50
      groups:
        - cluster-admins
      models:
        # # Simple string format (no rate limits)
        # - name: granite-3-3-2b-instruct
        #   tokenRateLimits:
        #     - limit: 100
        #       window: 1h
        # Object format with per-model rate limits
        - name: tinyllama-1b
          tokenRateLimits:
            - limit: 1000
              window: 1h

llm_d:
  enabled: true
  # Second inference stack: GatewayClass + ConfigMap service override + Gateway (ClusterIP via
  # infrastructure.parametersRef) + Route. Pattern matches llm-d-guide gateway templates.
  ocpRouteGateway:
    enabled: true
  # Internal-only inference stack: GatewayClass + ConfigMap service override + Gateway (ClusterIP)
  # without Route for internal Service-only access.
  internalOnly:
    enabled: false
  # Custom TLS certificate for external listeners (base64-encoded). Used by 08-llm-d Gateway when set.
  # MaaS (11-maas-rhcl) uses service-ca + Route reencrypt instead.
  tlsCrtB64: ""
  tlsKeyB64: ""
  # Grafana dashboards for llm-d monitoring
  grafana:
    enabled: true

# https://access.redhat.com/articles/7136121
mlflow:
  enabled: true

trustyai:
  enabled: true

evalHub:
  enabled: true
  namespace: redhat-ods-applications  # Namespace where EvalHub service runs
  replicas: 1
  mlflowTrackingUri: "http://mlflow.mlflow.svc.cluster.local:5000"
  providers:
    - lm-evaluation-harness
    - garak
    - guidellm
  collections:
    - safety-and-fairness-v1
  postgresql:
    enabled: true
    namespace: rhoai-evalhub-db
    name: evalhub-postgresql
    image: registry.redhat.io/rhel9/postgresql-15:latest
    connection:
      database: evalhub
      user: evalhub
      password: SecurePassword123  # Change for production
      storageSize: 10Gi
    service:
      port: 5432

featureStore:
  enabled: true
  namespace: rhoai-feature-store
  examples:
    - enabled: false
      name: banking
      authz:
        enabled: false
      feastProjectDir:
        git:
          url: https://github.com/alvarolop/banking-feature-store
          ref: rbac
      # persistence:
      #   online:
      #     size: 5Gi
      #   offline:
      #     size: 5Gi
      #   registry:
      #     size: 5Gi
    # - enabled: true
    #   name: music
    #   authz:
    #     enabled: false
    #   feastProjectDir:
    #     git:
    #       url: https://github.com/rhoai-mlops/jukebox
    #       ref: main
    #       featureRepoPath: 7-feature_store/feature_repo

metalLB:
  enabled: false
  addresses:
    - 192.168.1.100/32
