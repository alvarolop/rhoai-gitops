# Default values for rhoai-installation-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  culling:
    enabled: true
  clusterDomain: "opentlc.com"

modelRegistry:
  enabled: true
  mysql:
    enabled: true
    namespace: rhoai-model-registries-mysql
    name: mysql
    metrics:
      enabled: false
    persistence:
      enabled: true
      size: 30Gi

distributedWorkloads:
  enabled: true
  # Must match ClusterQueue and LocalQueue names used on the cluster (see templates/05-distributed-workloads).
  clusterQueueName: cluster-queue
  defaultLocalQueueName: default
  cpuResourceFlavorName: cpu-flavor
  gpuResourceFlavorName: gpu-flavor
  # Topology Aware Scheduling: Topology CR + ResourceFlavor.spec.topologyName + nodeLabels (Kueue
  # requirement). Prevents SchedulingGated deadlocks for GPU serving (e.g. LLMInferenceService /
  # LlamaGuard) when pods carry topology requests but the flavor had no topology link.
  # Set false only if your Kueue build has no Topology CRD or you manage TAS elsewhere.
  topologyAwareScheduling: true
  # Topology name (`rhoai-hostname`) and ResourceFlavor `nodeLabels` are hardcoded in
  # templates/05-distributed-workloads/topology-hostname.yaml and resourceflavor-*.yaml.

llamaStack:
  enabled: true

# When true: DataScienceCluster sets kserve.modelsAsService to Managed and the chart applies the
# maas-default-gateway GatewayClass (Gateway API). Required for MaaS-style LLMInferenceService
# router.gateway.refs (e.g. rhoai-serving values-tinyllama-1b-maas.yaml). Set false if you only
# use normal Route + llm-d without a shared inference Gateway.
modelsAsService:
  enabled: false

llm_d:
  enabled: true
  # Optional second Gateway (GatewayClass + Gateway + Route) for Router-based ingress. HTTPRoute
  # resources must use parentRefs to this Gateway (name openshift-ai-inference-ocproute,
  # namespace openshift-ingress) when you adopt this path. Enable only after confirming the
  # backend Service name and port name match your mesh (see routeTargetPortName / backendServiceName).
  ocpRouteGateway:
    enabled: true
    # If empty, defaults to inference-gateway-route.apps.<global.clusterDomain>
    hostname: ""
    # Named port on the Istio ingress Service backing this Gateway (often http2 on port 80).
    routeTargetPortName: http2
    # Istio auto-deploy typically names the Service like the Gateway metadata.name.
    backendServiceName: ""

# https://access.redhat.com/articles/7136121
mlflow:
  enabled: true

trustyai:
  enabled: true

featureStore:
  enabled: true
  namespace: rhoai-feature-store
  examples:
    - enabled: true
      name: banking
      authz:
        enabled: false
      feastProjectDir:
        git:
          url: https://github.com/alvarolop/banking-feature-store
          ref: rbac
