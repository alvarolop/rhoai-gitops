---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: rhcl-dns-operator
  namespace: grafana
  labels:
    app: grafana
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  configMapRef:
    name: rhcl-dns-operator-dashboard
    key: "dns-operator-dashboard.json"
  folder: "Red Hat Connectivity Link"
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"
