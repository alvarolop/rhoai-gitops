---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: rhcl-business-user
  namespace: grafana
  labels:
    app: grafana
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  configMapRef:
    name: rhcl-business-user-dashboard
    key: "business-user-dashboard.json"
  folder: "Red Hat Connectivity Link"
  datasources:
    - inputName: "datasource"
      datasourceName: "Prometheus"
